[project]
name = "LingHuiBot"
version = "1.6"
description = "LingHuiBot"
readme = "README.md"
requires-python = "==3.13.5"
dependencies = [
    "nonebot2[fastapi]>=2.4.4",
    "nonebot-adapter-onebot>=2.4.6",
    "nonebot-plugin-orm>=0.8.2",
    "nonebot-plugin-apscheduler>=0.5.0",
    "nonebot-plugin-picstatus>=2.2.2",
    "nonebot-plugin-picmcstat>=0.8.0",
    "nonebot-plugin-multincm>=1.3.1.post1",
    "nonebot-plugin-datastore>=1.3.1",
    "nonebot-plugin-localstore>=0.7.4",
    "nonebot_plugin_mc_server_status>=0.4.1",
    "nonebot-plugin-htmlrender>=0.6.7",
    "pandas>=2.3.3",
    "pyahocorasick>=2.2.0",
    "zhconv>=1.4.3",
    "emoji==2.15.0",
    "psutil==7.0.0"
]

[tool.nonebot]

plugin_dirs = ["src/plugins"]
builtin_plugins = []
[tool.nonebot.plugins]
"@local" = []
nonebot-plugin-apscheduler = ["nonebot_plugin_apscheduler"]
nonebot-plugin-localstore = ["nonebot_plugin_localstore"]
nonebot-plugin-multincm = ["nonebot_plugin_multincm"]
nonebot-plugin-datastore = ["nonebot_plugin_datastore"]
nonebot-plugin-picmcstat = ["nonebot_plugin_picmcstat"]
nonebot-plugin-orm = ["nonebot_plugin_orm"]
nonebot-plugin-picstatus = ["nonebot_plugin_picstatus"]
nonebot_plugin_mc_server_status = ["nonebot_plugin_mc_server_status"]
nonebot-plugin-htmlrender = ["nonebot_plugin_htmlrender"]


[tool.nonebot.adapters]
"@local" = []
nonebot-adapter-onebot = [{name = "OneBot V11", module_name = "nonebot.adapters.onebot.v11"}]
